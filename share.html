<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Project — StructLearn Pro</title>
<meta name="description" content="View this shared structural design project on StructLearn Pro.">
<meta name="robots" content="noindex">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#030712; color:#e2e8f0; font-family:Arial,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.topbar {
  background:#060c18;
  border-bottom:1px solid rgba(56,189,248,0.1);
  padding:10px 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-shrink:0; flex-wrap:wrap; gap:8px;
  z-index:100;
}
.logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
.logo-icon { width:30px;height:30px;background:linear-gradient(135deg,#1d4ed8,#38bdf8);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px; }
.logo-name { font-size:14px;font-weight:900;color:#f8fafc;letter-spacing:-0.5px; }
.logo-name span { color:#38bdf8; }
.topbar-right { display:flex;align-items:center;gap:10px;flex-wrap:wrap; }
.proj-title { font-size:13px;font-weight:700;color:#94a3b8;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.badge { display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:16px;font-size:11px;color:#38bdf8;font-weight:600; }
.try-btn { padding:7px 16px;background:linear-gradient(135deg,#1d4ed8,#38bdf8);border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block; }

/* Loading / error states */
.state-screen {
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px;text-align:center;
}
.state-icon { font-size:48px;margin-bottom:16px; }
.state-title { font-size:20px;font-weight:700;color:#f1f5f9;margin-bottom:8px; }
.state-sub { font-size:13px;color:#475569;line-height:1.7;max-width:400px;margin-bottom:24px; }

/* Iframe container */
.iframe-wrap {
  flex:1;overflow:hidden;display:none;
  background:#030712;
}
.iframe-wrap iframe {
  width:100%;height:100%;border:none;
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="https://structlearnpro.com" class="logo">
    <div class="logo-icon">🏗</div>
    <div class="logo-name">STRUCT<span>LEARN</span> PRO</div>
  </a>
  <div class="topbar-right">
    <div class="proj-title" id="proj-title">Loading...</div>
    <div class="badge">👁 Read-Only · Full Report</div>
    <a href="https://structlearnpro.com" class="try-btn">Try Free →</a>
  </div>
</div>

<!-- LOADING STATE -->
<div class="state-screen" id="screen-loading">
  <div class="state-icon">⏳</div>
  <div class="state-title">Loading project...</div>
  <div class="state-sub">Fetching design data from StructLearn Pro</div>
</div>

<!-- ERROR STATE -->
<div class="state-screen" id="screen-error" style="display:none">
  <div class="state-icon">❌</div>
  <div class="state-title" id="err-title">Project not found</div>
  <div class="state-sub" id="err-sub">This share link may have been revoked or the project no longer exists.</div>
  <a href="https://structlearnpro.com" class="try-btn">Go to StructLearn Pro →</a>
</div>

<!-- FULL REPORT IFRAME -->
<div class="iframe-wrap" id="iframe-wrap">
  <iframe id="report-iframe" src="StructLearnPro.html" onload="onIframeReady()"></iframe>
</div>

<script>
var SUPA_URL = 'https://rpjdveuxxjeoeomkwrfx.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJwamR2ZXV4eGplb2VvbWt3cmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzY3NzIsImV4cCI6MjA5NDUxMjc3Mn0.3JvvMaCFKg2fB9-l2WJ5JMX5btGIKqvpMj_ZcxSRWaQ';

var _project = null;
var _iframeReady = false;

// Load project from Supabase
window.addEventListener('load', async function(){
  var token = new URLSearchParams(window.location.search).get('token');
  if(!token){
    showError('No share token', 'Please check the link and try again.');
    return;
  }

  try {
    var resp = await fetch(
      SUPA_URL + '/rest/v1/projects?share_token=eq.' + token + '&select=*',
      { headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY } }
    );
    var data = await resp.json();

    if(!Array.isArray(data) || !data.length){
      showError('Project not found', 'This share link may have been revoked or the project no longer exists.');
      return;
    }

    _project = data[0];

    // Update title in top bar
    var titleEl = document.getElementById('proj-title');
    if(titleEl) titleEl.textContent = _project.name || 'Untitled Project';
    document.title = (_project.name || 'Shared Project') + ' — StructLearn Pro';

    // Show iframe, hide loading
    document.getElementById('screen-loading').style.display = 'none';
    document.getElementById('iframe-wrap').style.display = 'block';

    // If iframe already ready, inject now
    if(_iframeReady) injectProject();

  } catch(e) {
    showError('Failed to load', 'Please check your connection and try again.');
  }
});

// Called when StructLearnPro.html iframe finishes loading
function onIframeReady(){
  _iframeReady = true;
  if(_project) injectProject();
}

function injectProject(){
  var fr = document.getElementById('report-iframe');
  if(!fr || !fr.contentWindow || !_project) return;

  // Small delay to let the iframe JS fully initialise
  setTimeout(function(){
    var fr2 = document.getElementById('report-iframe');
    if(!fr2 || !fr2.contentWindow) return;

    // 1. Send plan as pro so all tabs unlocked
    fr2.contentWindow.postMessage({ type:'USER_PLAN', plan:'pro', user:{} }, '*');

    // 2. Load the project — go directly to Full Report (page 7)
    fr2.contentWindow.postMessage({
      type: 'LOAD_PROJECT',
      project: _project,
      goStep: 7
    }, '*');

    // 3. Set read-only mode — hides nav, run button etc.
    setTimeout(function(){
      var fr3 = document.getElementById('report-iframe');
      if(fr3 && fr3.contentWindow){
        fr3.contentWindow.postMessage({ type:'SET_READONLY' }, '*');
      }
    }, 800);

  }, 600);
}

function showError(title, msg){
  document.getElementById('screen-loading').style.display = 'none';
  document.getElementById('screen-error').style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-sub').textContent = msg;
}
</script>

</body>
</html>
